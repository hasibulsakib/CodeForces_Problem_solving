
<style>
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.prob-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.prob-table th{padding:8px 10px;text-align:left;font-weight:500;font-size:12px;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.prob-table td{padding:7px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:middle}
.prob-table tr:last-child td{border-bottom:none}
.prob-table tr:hover td{background:var(--color-background-secondary)}
.topic-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.done-btn{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.done-btn.checked{background:#1D9E75;border-color:#1D9E75}
.done-btn.checked::after{content:'✓';color:#fff;font-size:11px}
.section-header{padding:10px 12px;font-size:13px;font-weight:500;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:8px}
.block{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:14px}
.prob-link{color:var(--color-text-info);text-decoration:none;font-size:13px}
.prob-link:hover{text-decoration:underline}
.progress-bar-wrap{height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden;margin:2px 0 0}
.progress-bar-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width .3s}
.stat-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
</style>

<h2 class="sr-only">800 rating এর 50টি Codeforces problem — topic অনুযায়ী সাজানো, সাথে done tracker</h2>

<div id="stat-row" class="stat-row">
  <span style="font-size:13px;color:var(--color-text-secondary);">সম্পন্ন:</span>
  <span id="done-count" style="font-size:15px;font-weight:500;color:#1D9E75">0</span>
  <span style="font-size:13px;color:var(--color-text-secondary);">/ 50</span>
  <div style="flex:1;max-width:200px">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <span id="prog-pct" style="font-size:12px;color:var(--color-text-secondary);">0%</span>
</div>

<div id="problems-container"></div>

    ]
  },

      {num:46, id:"1A_m", title:"Helpful Maths 2", url:"https://codeforces.com/problemset/problem/492/A"},
      {num:47, id:"1095A", title:"Repeating Cipher", url:"https://codeforces.com/problemset/problem/1095/A"},
      {num:48, id:"1352A", title:"Sum of Round Numbers", url:"https://codeforces.com/problemset/problem/1352/A"},
      {num:49, id:"1A_n", title:"k-Rounding", url:"https://codeforces.com/problemset/problem/858/A"},
      {num:50, id:"1360A", title:"Minimal Square", url:"https://codeforces.com/problemset/problem/1360/A"},
    ]
  }
];

const done = new Set(JSON.parse(localStorage.getItem('cf800done')||'[]').map(String));

function updateProgress(){
  const n = done.size;
  document.getElementById('done-count').textContent = n;
  document.getElementById('prog-fill').style.width = (n/50*100).toFixed(0)+'%';
  document.getElementById('prog-pct').textContent = (n/50*100).toFixed(0)+'%';
}

const container = document.getElementById('problems-container');

topics.forEach(topic => {
  const block = document.createElement('div');
  block.className = 'block';

  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = `<span class="topic-badge" style="background:${topic.color};color:${topic.textColor}">${topic.name}</span><span style="font-size:12px;color:var(--color-text-secondary)">${topic.problems.length} problems</span>`;
  block.appendChild(header);

  const table = document.createElement('table');
  table.className = 'prob-table';
  table.innerHTML = '<colgroup><col style="width:36px"><col style="width:52px"><col><col style="width:80px"></colgroup><thead><tr><th></th><th>#</th><th>Problem</th><th style="text-align:center">Done</th></tr></thead>';
  const tbody = document.createElement('tbody');

  topic.problems.forEach((p, i) => {
    const tr = document.createElement('tr');
    const isDone = done.has(String(p.num));
    tr.innerHTML = `
      <td style="color:var(--color-text-tertiary);font-size:12px">${p.num}</td>
      <td><span style="font-family:var(--font-mono);font-size:12px;color:var(--color-text-secondary)">${p.id.replace(/_.*$/,'')}</span></td>
      <td><a class="prob-link" href="${p.url}" target="_blank">${p.title}</a></td>
      <td style="text-align:center"><button class="done-btn${isDone?' checked':''}" data-num="${p.num}" aria-label="Mark as done"></button></td>
    `;
    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  block.appendChild(table);
  container.appendChild(block);
});

document.addEventListener('click', e => {
  const btn = e.target.closest('.done-btn');
  if(!btn) return;
  const num = String(btn.dataset.num);
  if(done.has(num)){done.delete(num);btn.classList.remove('checked');}
  else{done.add(num);btn.classList.add('checked');}
  try{localStorage.setItem('cf800done', JSON.stringify([...done]));}catch(err){}
  updateProgress();
});

updateProgress();
</script>
